# À utiliser quand ce dossier est la RACINE du dépôt Git (repo dédié « esiee-air-quality », etc.).
# Sur le monorepo `player1`, le fichier à la racine du repo parent pointe vers `air-quality-web/`.

services:
  - type: web
    name: qualitedelair
    runtime: node
    plan: free
    # --include=dev : Render définit NODE_ENV=production au build ; sinon @types/react n'est pas installé et `tsc` échoue (TS7026).
    buildCommand: npm install && npm install --prefix server && npm install --prefix client --include=dev && npm run build --prefix client
    startCommand: cd server && SERVE_STATIC=1 NODE_ENV=production node index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DISABLE_MOCK
        value: "1"
      - key: ALLOWED_ORIGINS
        sync: false
      - key: SENSOR_API_KEY
        sync: false
